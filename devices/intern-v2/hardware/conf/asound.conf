# Persistent ALSA aliases for HAL on Orange Pi 4 Pro (A733).
# Onboard codec is ES8389 (card sndi2s4). No USB mic present.
pcm.device_speaker {
    type plug
    slave.pcm {
        type hw
        card sndi2s4
        device 0
    }
}
ctl.device_speaker { type hw card sndi2s4 }

pcm.device_micro1 {
    type plug
    slave.pcm {
        type hw
        card sndi2s4
        device 0
    }
}
ctl.device_micro1 { type hw card sndi2s4 }
