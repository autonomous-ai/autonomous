# ALSA aliases for the Lamp device.
#
# Part of the device rootfs overlay (devices/lamp/rootfs/) — the whole tree is
# copied onto / at image build (imager/build-orangepi.sh, Phase 3) and on every
# device-profile OTA (`software-update device`). One overlay per device type, so
# the routing matches THIS device's actual audio wiring, not the board's.
# See devices/lamp/hardware/wiring.md for the physical chain.
#
# Current Lamp HW revision (OrangePi 4 Pro / A733):
#   - Speaker:     USB audio board (DAC) -> PAM8610 amp.  ALSA card "Audio".
#   - Voice mic:   USB mic.                                ALSA card "Device".
#   - Sensing mic: onboard ES8389 codec.                  ALSA card "sndi2s4".
#
# Cards are addressed by NAME, not index: USB card numbers reorder across boots,
# but the card id string is stable. The HAL .env binds the aliases:
#   HAL_AUDIO_OUTPUT_ALSA=plug:device_speaker
#   HAL_AUDIO_INPUT_ALSA=plug:device_micro2     (voice)
#   HAL_AUDIO_SENSING_DEVICE=plug:device_micro1 (ambient sensing)

# Speaker -> USB DAC -> PAM8610 amp
pcm.device_speaker {
    type plug
    slave.pcm {
        type hw
        card "Audio"
        device 0
    }
}
ctl.device_speaker { type hw card "Audio" }

# Voice capture (HAL_AUDIO_INPUT_ALSA) -> USB mic
pcm.device_micro2 {
    type plug
    slave.pcm {
        type hw
        card "Device"
        device 0
    }
}
ctl.device_micro2 { type hw card "Device" }

# Ambient sensing capture (HAL_AUDIO_SENSING_DEVICE) -> onboard ES8389 codec
pcm.device_micro1 {
    type plug
    slave.pcm {
        type hw
        card "sndi2s4"
        device 0
    }
    route_policy average
}
ctl.device_micro1 { type hw card "sndi2s4" }
