name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go (os/core) — build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: build
        working-directory: os/core
        run: go build ./...
      - name: vet
        working-directory: os/core
        run: go vet ./...
      - name: test
        working-directory: os/core
        run: go test ./...

  python:
    name: Python (os/hal) — unit tests · syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: unit tests (board + device — no hardware deps)
        working-directory: os/hal
        run: python -m unittest lelamp.test.test_board lelamp.test.test_device -v
      - name: syntax check platform + refactored drivers
        working-directory: os/hal
        run: |
          python -m py_compile \
            lelamp/platform/board.py \
            lelamp/platform/device.py \
            lelamp/service/rgb/rgb_service.py \
            lelamp/service/gpio_button.py \
            lelamp/service/ttp223.py
